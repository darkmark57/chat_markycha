<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="style.css" />
        <script src='https://cdnjs.cloudflare.com/ajax/libs/alertify.js/0.3.11/alertify.js' integrity='sha512-7Qu5pr+fIUNnTgU03DC5Y1b3brNO64CQUCT1X+hEcbMM8NGasu+WWBVtF7byk01X+gFdZqSPDpOV3y5lFair0A==' crossorigin='anonymous'></script>
        <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/alertify.js/0.3.11/alertify.core.css' integrity='sha512-eZih0rne5vAjEWet1syNsU3LTj1TygGLuLq304xv+JZeaIqi1E1OCbYFD0YPMqhgqFYoOH28QJzJIj+wkVWm+A==' crossorigin='anonymous'/>
        <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/alertify.js/0.3.11/alertify.bootstrap.css' integrity='sha512-eauod+oRhJ84heQKG7Koq4RFiVEXhqhi14M+3+m/6XPJ/FmRHz4yDJ9mtz1X8HdOmQjdX69Wg8/rKal7lgEfsw==' crossorigin='anonymous'/>
    </head>
    <body>
        <header>
            <h1>Чатік :)</h1>
        </header>
        <main id="login">
            <form>
                <h1>Login
                </h1>
                <label for="login">Login</label>
                <input type="text" name="login" id="login">
                <label for="password">Password</label>
                <input type="password" name="password" id="password">
            

                <button type="submit">Log in</button>
            </form>
        </main>
        <script>
            const form = document.querySelector("form")
            form.addEventListener("submit", (event)=>{
                event.preventDefault()
                let data = {
                    login: event.target["login"].value,
                    password: event.target["password"].value,
                }
                console.log(data)
                if(data.login.length < 3){
                    alertify.error("Login too short!")
                    return
                }
                if(data.password.length < 5){
                    alertify.error("Password too short")
                    return
                }
                fetch("/login", {
                    method: "POST",
                    headers: {
                        "Content-type": "application/json"
                    },
                    body: JSON.stringify(data)
                }).then(async res=> {
                    if(res.ok){
                        let token = await res.text()
                        document.cookie = "token=" + token
                        navigation.navigate("/")
                    }else{
                        alertify.error("Login Error!")
                    }
                })
            })
        </script>
    </body>
</html>
